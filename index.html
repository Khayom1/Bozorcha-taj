<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozorcha — Хуш омадед</title>
</head>
<body>
    <div class="main-gate">
        <h1>Bozorcha</h1>
        <p>Шумо кистед?</p>

        <button id="go-buyer" style="padding: 20px; background: #2196F3; color: white;">
            🛍️ Ман Харидор (Мехоҳам харид кунам)
        </button>

        <br><br>

        <button id="go-seller" style="padding: 20px; background: #FF9800; color: white;">
            🏪 Ман Фурӯшанда (Мехоҳам мағоза кушоям)
        </button>
    </div>

    <script>
        // ЛОГИКАИ ХАРИДОР
        document.getElementById('go-buyer').addEventListener('click', () => {
            localStorage.setItem('user_role', 'buyer');
            localStorage.setItem('is_guest', 'true'); // Нишонаи меҳмон
            window.location.href = 'src/pages/b-dashboard.html'; // Рост ба маркази харид
        });

        // ЛОГИКАИ ФУРӮШАНДА
        document.getElementById('go-seller').addEventListener('click', () => {
            localStorage.setItem('user_role', 'seller');
            localStorage.setItem('is_guest', 'false');
            window.location.href = '../src/pages/auth/method.html'; // Ба интихоби усули вуруд
        });
    </script>
</body>
</html>
