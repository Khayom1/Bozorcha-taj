<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел - Bozorcha</title>
    <style>
        :root {
            --primary: #FF9F43;
            --secondary: #FF6B6B;
            --bg: #F0F2F5;
            --surface: #FFFFFF;
            --text: #1A1C1E;
            --border: #EEEEEE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px; background: var(--surface); border-right: 1px solid var(--border);
            padding: 30px 20px; display: flex; flex-direction: column;
        }

        .logo { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }

        .nav-item {
            padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;
            margin-bottom: 5px; font-weight: 600; color: #6C757D; text-decoration: none;
        }
        .nav-item.active { background: var(--primary); color: white; }
        .nav-item:hover:not(.active) { background: #FFF4E8; color: var(--primary); }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--surface); padding: 25px; border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02); border: 1px solid var(--border);
        }
        .stat-card h3 { font-size: 14px; color: #6C757D; margin-bottom: 10px; }
        .stat-card p { font-size: 28px; font-weight: 800; color: var(--text); }

        /* Table */
        .content-card {
            background: var(--surface); border-radius: 24px; padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02); border: 1px solid var(--border);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: #6C757D; font-size: 14px; border-bottom: 2px solid var(--bg); }
        td { padding: 15px; border-bottom: 1px solid var(--bg); font-size: 15px; }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }

        .badge { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; background: #E8F5E9; color: #2E7D32; }

        .refresh-btn {
            background: var(--primary); color: white; border: none; padding: 10px 20px;
            border-radius: 12px; cursor: pointer; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <span>🛒 Bozorcha</span>
        </div>
        <a href="#" class="nav-item active">👤 Корбарон</a>
        <a href="#" class="nav-item">📦 Маҳсулотҳо</a>
        <a href="#" class="nav-item">⚙️ Танзимот</a>
    </div>

    <div class="main">
        <div class="header">
            <h1>Идоракунии корбарон</h1>
            <button class="refresh-btn" onclick="fetchUsers()">Навсозӣ</button>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Ҳамаи фурӯшандагон</h3>
                <p id="totalUsers">0</p>
            </div>
            <div class="stat-card">
                <h3>Фаъол дар 24 соат</h3>
                <p id="activeToday">0</p>
            </div>
            <div class="stat-card">
                <h3>Мағозаҳои нав</h3>
                <p id="newShops">0</p>
            </div>
        </div>

        <div class="content-card">
            <table>
                <thead>
                    <tr>
                        <th>Фурӯшанда</th>
                        <th>Мағоза</th>
                        <th>Суроға</th>
                        <th>Санаи сабт</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="userList">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        async function fetchUsers() {
            const listContainer = document.getElementById('userList');
            listContainer.innerHTML = '<tr><td colspan="5">Дар ҳоли боркунӣ...</td></tr>';

            const { data, error } = await _supabase
                .from('user')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                listContainer.innerHTML = '<tr><td colspan="5">Хатогӣ дар боркунӣ</td></tr>';
                return;
            }

            document.getElementById('totalUsers').innerText = data.length;
            
            listContainer.innerHTML = data.map(user => `
                <tr>
                    <td>
                        <div class="user-info">
                            <div class="avatar">${(user.full_name || 'U').charAt(0)}</div>
                            <div>
                                <b>${user.full_name || 'Ном надорад'}</b><br>
                                <small style="color: #6C757D">ID: ${user.id.substring(0,8)}...</small>
                            </div>
                        </div>
                    </td>
                    <td>${user.shop_name || '-'}</td>
                    <td>${user.shop_address || '-'}</td>
                    <td>${new Date(user.created_at).toLocaleDateString('tj-TJ')}</td>
                    <td><span class="badge">Active</span></td>
                </tr>
            `).join('');
        }

        // Боркунии аввалин
        fetchUsers();
    </script>
</body>
</html>
