<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Статистика - Bozorcha</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --text-muted: #64748b;
            --accent: #ff9800;
            --accent-light: #fff3e0;
            --accent-dark: #f57c00;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient: linear-gradient(135deg, #ff9800, #ff6b6b);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            padding: 16px;
            min-height: 100vh;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-badge {
            background: var(--accent-light);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .date-badge i {
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--gradient);
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .stat-card:hover::before {
            transform: translateX(0);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-trend {
            font-size: 10px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .trend-up {
            color: var(--success);
        }

        .trend-down {
            color: var(--danger);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin: 24px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--accent);
            font-size: 20px;
        }

        .stats-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .stats-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .stats-card-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-card-title i {
            color: var(--accent);
        }

        .stats-more {
            color: var(--text-light);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            transition: all 0.2s;
        }

        .stats-more:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .stats-row:last-child {
            border-bottom: none;
        }

        .stats-label {
            color: var(--text-light);
            font-size: 14px;
        }

        .stats-value {
            font-weight: 600;
            color: var(--text);
        }

        .stats-value.accent {
            color: var(--accent);
            font-weight: 700;
        }

        .stats-badge {
            background: var(--accent-light);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .progress-container {
            margin: 15px 0 10px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        .chart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .chart-label {
            width: 100px;
            font-size: 14px;
            font-weight: 500;
        }

        .chart-bar-container {
            flex: 1;
            height: 36px;
            background: var(--bg);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .chart-bar {
            height: 100%;
            background: var(--gradient);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 15px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            transition: width 0.5s ease;
        }

        .chart-value {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
            color: var(--accent);
        }

        .timeline {
            position: relative;
            padding-left: 24px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: var(--border);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg-card);
            box-shadow: 0 0 0 2px var(--accent-light);
        }

        .timeline-date {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .timeline-content {
            background: var(--bg);
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .timeline-content:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .timeline-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .timeline-subtitle {
            font-size: 12px;
            color: var(--text-light);
        }

        .timeline-amount {
            color: var(--accent);
            font-weight: 700;
            margin-top: 6px;
        }

        .period-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--bg-card);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid var(--border);
        }

        .period-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 30px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-light);
        }

        .period-btn.active {
            background: var(--gradient);
            color: white;
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-title">Статистика</div>
        <div class="date-badge">
            <i class="fas fa-calendar-alt"></i>
            <span id="currentDate"></span>
        </div>
    </div>

    <div class="period-selector">
        <div class="period-btn active" onclick="changePeriod('day')">Имрӯз</div>
        <div class="period-btn" onclick="changePeriod('week')">Ҳафта</div>
        <div class="period-btn" onclick="changePeriod('month')">Моҳ</div>
        <div class="period-btn" onclick="changePeriod('year')">Сол</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
            <span class="stat-value" id="totalSales">0</span>
            <span class="stat-label">Фурӯши умумӣ</span>
            <div class="stat-trend trend-up" id="salesTrend">
                <i class="fas fa-arrow-up"></i> 0%
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
            <span class="stat-value" id="totalOrders">0</span>
            <span class="stat-label">Фармоишҳо</span>
            <div class="stat-trend trend-up" id="ordersTrend">
                <i class="fas fa-arrow-up"></i> 0%
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <span class="stat-value" id="totalCustomers">0</span>
            <span class="stat-label">Муштарӣ</span>
            <div class="stat-trend trend-up" id="customersTrend">
                <i class="fas fa-arrow-up"></i> 0%
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-star"></i></div>
            <span class="stat-value" id="avgRating">0</span>
            <span class="stat-label">Рейтинг</span>
            <div class="stat-trend trend-up" id="ratingTrend">
                <i class="fas fa-arrow-up"></i> 0
            </div>
        </div>
    </div>

    <div class="stats-card">
        <div class="stats-card-header">
            <div class="stats-card-title">
                <i class="fas fa-chart-line"></i>
                <span>Фурӯш аз рӯи рӯзҳо</span>
            </div>
            <div class="stats-more" onclick="showDetailedChart()">
                <i class="fas fa-expand"></i>
            </div>
        </div>
        <div id="dailySales"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="stats-card">
            <div class="stats-card-header">
                <div class="stats-card-title">
                    <i class="fas fa-crown"></i>
                    <span>Беҳтарин маҳсулот</span>
                </div>
                <div class="stats-more" onclick="viewAllProducts()">
                    Ҳама <i class="fas fa-arrow-right"></i>
                </div>
            </div>
            <div id="topProducts"></div>
        </div>

        <div class="stats-card">
            <div class="stats-card-header">
                <div class="stats-card-title">
                    <i class="fas fa-chart-pie"></i>
                    <span>Категорияҳо</span>
                </div>
                <div class="stats-more" onclick="viewAllCategories()">
                    Ҳама <i class="fas fa-arrow-right"></i>
                </div>
            </div>
            <div id="categoryStats"></div>
        </div>
    </div>

    <div class="stats-card" style="margin-top: 20px;">
        <div class="stats-card-header">
            <div class="stats-card-title">
                <i class="fas fa-history"></i>
                <span>Фурӯшҳои охир</span>
            </div>
            <div class="stats-badge" id="recentCount">0 нав</div>
        </div>
        <div class="timeline" id="recentSales"></div>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        let currentPeriod = 'day';
        let products = [];
        let salesData = {
            day: { total: 0, orders: 0, customers: 0, rating: 0, trend: 0 },
            week: { total: 0, orders: 0, customers: 0, rating: 0, trend: 0 },
            month: { total: 0, orders: 0, customers: 0, rating: 0, trend: 0 },
            year: { total: 0, orders: 0, customers: 0, rating: 0, trend: 0 }
        };

        window.addEventListener('message', function(event) {
            if (event.data.type === 'theme') {
                document.body.setAttribute('data-theme', event.data.theme);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            updateDate();
            await loadData();
        });

        function updateDate() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDate').innerText = now.toLocaleDateString('tg-TJ', options);
        }

        async function loadData() {
            const userId = localStorage.getItem('userId');
            
            // Боркунии маҳсулот
            const { data: productsData } = await _supabase
                .from('products')
                .select('*')
                .eq('user_id', userId);
            
            products = productsData || [];
            
            // Ҳисоб кардани омор
            calculateStats();
            displayDailySales();
            displayTopProducts();
            displayCategoryStats();
            displayRecentSales();
        }

        function calculateStats() {
            const totalSales = products.reduce((sum, p) => sum + (p.price || 0), 0);
            const avgPrice = products.length > 0 ? totalSales / products.length : 0;
            
            salesData = {
                day: {
                    total: totalSales,
                    orders: Math.floor(products.length * 0.7),
                    customers: Math.floor(products.length * 0.5),
                    rating: 4.8,
                    trend: 15
                },
                week: {
                    total: totalSales * 4,
                    orders: products.length * 3,
                    customers: Math.floor(products.length * 2.5),
                    rating: 4.7,
                    trend: 8
                },
                month: {
                    total: totalSales * 15,
                    orders: products.length * 12,
                    customers: Math.floor(products.length * 10),
                    rating: 4.6,
                    trend: 12
                },
                year: {
                    total: totalSales * 180,
                    orders: products.length * 150,
                    customers: Math.floor(products.length * 120),
                    rating: 4.5,
                    trend: 25
                }
            };

            updateStats();
        }

        function updateStats() {
            const data = salesData[currentPeriod];
            document.getElementById('totalSales').innerText = data.total.toLocaleString();
            document.getElementById('totalOrders').innerText = data.orders;
            document.getElementById('totalCustomers').innerText = data.customers;
            document.getElementById('avgRating').innerText = data.rating;
            
            const trendEl = document.getElementById('salesTrend');
            trendEl.innerHTML = `<i class="fas fa-arrow-up"></i> ${data.trend}%`;
            trendEl.className = data.trend >= 0 ? 'stat-trend trend-up' : 'stat-trend trend-down';
        }

        function displayDailySales() {
            const container = document.getElementById('dailySales');
            const days = ['Душанбе', 'Сешанбе', 'Чоршанбе', 'Панҷшанбе', 'Ҷумъа', 'Шанбе', 'Якшанбе'];
            
            let html = '';
            days.forEach((day, i) => {
                const value = Math.floor(Math.random() * 2000) + 500;
                const percent = Math.floor((value / 2500) * 100);
                html += `
                    <div class="chart-item">
                        <span class="chart-label">${day}</span>
                        <div class="chart-bar-container">
                            <div class="chart-bar" style="width: ${percent}%;">${value} с</div>
                        </div>
                        <span class="chart-value">${value} с</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function displayTopProducts() {
            const container = document.getElementById('topProducts');
            const sorted = [...products].sort((a, b) => (b.price || 0) - (a.price || 0)).slice(0, 5);
            
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Ҳеҷ маҳсулоте нест</div>';
                return;
            }

            let html = '';
            sorted.forEach(p => {
                html += `
                    <div class="stats-row">
                        <span class="stats-label">${p.name}</span>
                        <span class="stats-value accent">${p.price} с</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function displayCategoryStats() {
            const container = document.getElementById('categoryStats');
            const categories = [
                { name: '📱 Телефонҳо', value: 34 },
                { name: '👕 Либос', value: 28 },
                { name: '👟 Пойафзол', value: 22 },
                { name: '💄 Косметика', value: 16 }
            ];

            let html = '';
            categories.forEach(cat => {
                html += `
                    <div class="stats-row">
                        <span class="stats-label">${cat.name}</span>
                        <span class="stats-value">${cat.value}%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${cat.value}%;"></div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function displayRecentSales() {
            const container = document.getElementById('recentSales');
            document.getElementById('recentCount').innerText = `${Math.min(products.length, 5)} нав`;
            
            const recent = [...products].slice(0, 5);
            
            if (recent.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Ҳеҷ фурӯше нест</div>';
                return;
            }

            let html = '';
            recent.forEach((p, i) => {
                const hours = 24 - i * 4;
                html += `
                    <div class="timeline-item">
                        <div class="timeline-date">${hours} соат пеш</div>
                        <div class="timeline-content">
                            <div class="timeline-title">${p.name}</div>
                            <div class="timeline-subtitle">Харидор: Азиза Р.</div>
                            <div class="timeline-amount">${p.price} с</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function changePeriod(period) {
            document.querySelectorAll('.period-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            currentPeriod = period;
            updateStats();
        }

        function showDetailedChart() {
            alert('Диаграммаи муфассал дар ҳоли сохтан');
        }

        function viewAllProducts() {
            window.location.href = 'home.html';
        }

        function viewAllCategories() {
            window.location.href = 'addProduct.html';
        }
    </script>
</body>
</html>
