<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пур кардани профил - Bozorcha</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-primary: #1A1C1E;
            --text-secondary: #6C757D;
            --accent-gradient: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            --border: #EEEEEE;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --surface: #161618;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --border: #2C2E33;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }

        body {
            background-color: var(--bg); color: var(--text-primary);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .awning-part { transform-origin: top center; animation: windSwing 3s ease-in-out infinite; }
        @keyframes windSwing { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg) skewX(2deg); } }

        .card {
            background: var(--surface); border-radius: 35px; padding: 40px 30px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            max-width: 400px; width: 100%; position: relative; text-align: center;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: var(--text-primary);
        }

        .controls { display: flex; gap: 8px; }
        .icon-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 18px; position: relative; overflow: hidden;
        }

        .theme-icon-box { position: relative; width: 20px; height: 20px; }
        .sun, .moon { position: absolute; inset: 0; transition: all 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        [data-theme="light"] .sun { transform: translateY(0); opacity: 1; }
        [data-theme="light"] .moon { transform: translateY(25px); opacity: 0; }
        [data-theme="dark"] .sun { transform: translateY(-25px); opacity: 0; }
        [data-theme="dark"] .moon { transform: translateY(0); opacity: 1; }

        .dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: 50px; right: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 15px; box-shadow: var(--shadow);
            display: none; flex-direction: column; overflow: hidden; z-index: 100; min-width: 120px;
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 12px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; gap: 8px; justify-content: flex-start; }
        .dropdown-item:hover { background: var(--accent-gradient); color: white; }

        .title { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: left; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; text-align: left; line-height: 1.4; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block; font-weight: 600; margin-bottom: 8px;
            color: var(--text-primary); font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 15px;
            background: var(--bg); border: 2px solid var(--border);
            border-radius: 16px; font-size: 16px;
            color: var(--text-primary); outline: none;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #FF9F43;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            width: 100%; padding: 20px; border-radius: 20px;
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            margin-top: 20px; transition: transform 0.2s, opacity 0.3s;
        }
        .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2); }
        .btn-primary.disabled { opacity: 0.5; pointer-events: none; }

        footer { margin-top: 40px; color: var(--text-secondary); font-size: 12px; }
        .error-message { color: #ff4444; font-size: 13px; text-align: left; visibility: hidden; min-height: 20px; }
        .error-message.show { visibility: visible; }
    </style>
</head>
<body data-theme="light">
    <div class="card">
        <header>
            <div class="header-left">
                <button class="back-btn" onclick="history.back()">←</button>
                <svg width="45" height="45" viewBox="0 0 200 200">
                    <path class="awning-part" d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="#f4ce9b"/>
                    <path d="M 25 105 Q 65 140 25 195 L 25 105 Z" fill="#eea54a"/>
                    <path d="M 90 120 L 125 120 Q 125 160 160 130 Q 195 160 150 195 Q 80 200 90 120 Z" fill="#e45d27"/>
                </svg>
            </div>
            <div class="controls">
                <div class="dropdown">
                    <button class="icon-btn" id="langBtn">🇹🇯</button>
                    <div class="dropdown-menu" id="langMenu">
                        <div class="dropdown-item" onclick="setLang('tj')">🇹🇯 Тоҷикӣ</div>
                        <div class="dropdown-item" onclick="setLang('ru')">🇷🇺 Русский</div>
                        <div class="dropdown-item" onclick="setLang('en')">🇬🇧 English</div>
                    </div>
                </div>
                <button class="icon-btn" id="themeBtn">
                    <div class="theme-icon-box">
                        <span class="sun">☀️</span>
                        <span class="moon">🌙</span>
                    </div>
                </button>
            </div>
        </header>

        <h1 class="title" id="t-title">Маълумоти профил</h1>
        <p class="subtitle" id="t-sub">Барои идома, маълумоти худро ворид кунед</p>

        <form id="profileForm">
            <div class="form-group">
                <label id="l-name">Ном</label>
                <input type="text" id="name" placeholder="Номи шахсии шумо" autocomplete="given-name">
            </div>
            <div class="form-group">
                <label id="l-surname">Насаб</label>
                <input type="text" id="surname" placeholder="Насаби шумо" autocomplete="family-name">
            </div>
            <div class="form-group">
                <label id="l-shop">Номи мағоза</label>
                <input type="text" id="shopName" placeholder="Масалан: 'Мағозаи Аҳмад'">
            </div>
            <div class="form-group">
                <label id="l-address">Макони мағоза</label>
                <textarea id="shopAddress" placeholder="Суроғаи пурра, масалан: Душанбе, кӯчаи Айнӣ 45"></textarea>
            </div>
        </form>

        <button class="btn btn-primary" id="submitBtn">Сабт кардан</button>
        <footer id="t-foot">© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        const i18n = {
            tj: { 
                flag: "🇹🇯", 
                title: "Маълумоти профил", 
                sub: "Барои идома, маълумоти худро ворид кунед",
                name: "Ном",
                surname: "Насаб",
                shop: "Номи мағоза",
                address: "Макони мағоза",
                btn: "Сабт кардан",
                foot: "© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.",
                success: "Маълумоти шумо сабт шуд!",
                error: "Лутфан ҳамаи майдонҳоро пур кунед"
            },
            ru: { 
                flag: "🇷🇺", 
                title: "Информация профиля", 
                sub: "Заполните информацию для продолжения",
                name: "Имя",
                surname: "Фамилия",
                shop: "Название магазина",
                address: "Адрес магазина",
                btn: "Сохранить",
                foot: "© 2026 Bozorcha. Все права защищены.",
                success: "Ваша информация сохранена!",
                error: "Пожалуйста, заполните все поля"
            },
            en: { 
                flag: "🇬🇧", 
                title: "Profile Information", 
                sub: "Fill in your information to continue",
                name: "First name",
                surname: "Last name",
                shop: "Shop name",
                address: "Shop address",
                btn: "Save",
                foot: "© 2026 Bozorcha. All rights reserved.",
                success: "Your information has been saved!",
                error: "Please fill all fields"
            }
        };

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedLang = localStorage.getItem('lang') || 'tj';
            document.body.setAttribute('data-theme', savedTheme);
            setLang(savedLang);
        };

        document.getElementById('themeBtn').onclick = () => {
            const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };

        document.getElementById('langBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('langMenu').classList.toggle('show'); };
        window.onclick = () => document.getElementById('langMenu').classList.remove('show');

        function setLang(lang) {
            const d = i18n[lang];
            document.getElementById('langBtn').innerText = d.flag;
            document.getElementById('t-title').innerText = d.title;
            document.getElementById('t-sub').innerText = d.sub;
            document.getElementById('l-name').innerText = d.name;
            document.getElementById('l-surname').innerText = d.surname;
            document.getElementById('l-shop').innerText = d.shop;
            document.getElementById('l-address').innerText = d.address;
            document.getElementById('submitBtn').innerText = d.btn;
            document.getElementById('t-foot').innerText = d.foot;
            localStorage.setItem('lang', lang);
        }

        document.getElementById('submitBtn').onclick = async () => {
            const name = document.getElementById('name').value.trim();
            const surname = document.getElementById('surname').value.trim();
            const shopName = document.getElementById('shopName').value.trim();
            const shopAddress = document.getElementById('shopAddress').value.trim();

            const lang = localStorage.getItem('lang') || 'tj';

            if (!name || !surname || !shopName || !shopAddress) {
                alert(i18n[lang].error);
                return;
            }

            // Гирифтани ID-и корбар (бояд аз марҳилаи қаблӣ дар localStorage бошад)
            const userId = localStorage.getItem('userId');
            if (!userId) {
                alert("ID-и корбар ёфт нашуд. Лутфан аз нав ворид шавед.");
                window.location.href = 'index.html';
                return;
            }

            // Навсозии маълумот дар Supabase
            const { error } = await _supabase
                .from('user')
                .update({
                    full_name: name + ' ' + surname,
                    shop_name: shopName,
                    shop_address: shopAddress
                })
                .eq('id', userId);

            if (error) {
                alert("Хатогӣ: " + error.message);
                console.error(error);
            } else {
                alert(i18n[lang].success);
                window.location.href = 'dashboard.html';
            }
        };
    </script>
</body>
</html>
