<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пур кардани профил - Bozorcha</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-primary: #1A1C1E;
            --text-secondary: #6C757D;
            --accent-gradient: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            --border: #EEEEEE;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --surface: #161618;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --border: #2C2E33;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Аниматсияи Логотип */
        .awning-part { transform-origin: top center; animation: windSwing 3s ease-in-out infinite; }
        @keyframes windSwing { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg) skewX(2deg); } }

        .card {
            background: var(--surface);
            border-radius: 35px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            max-width: 450px;
            width: 100%;
        }

        header { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }

        .title { font-size: 24px; font-weight: 800; margin-bottom: 8px; text-align: center; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; text-align: center; line-height: 1.5; }

        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: var(--text-primary); }
        
        input {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #FF9F43; box-shadow: 0 0 0 4px rgba(255, 159, 67, 0.1); }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            background: var(--accent-gradient);
            color: white;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2);
            transition: transform 0.2s, opacity 0.3s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        footer { margin-top: 30px; color: var(--text-secondary); font-size: 12px; text-align: center; }
    </style>
</head>
<body data-theme="light">
    <div class="card">
        <header>
            <svg width="50" height="50" viewBox="0 0 200 200">
                <path class="awning-part" d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="#FF9F43"/>
                <path d="M 25 105 Q 65 140 25 195 L 25 105 Z" fill="#FF6B6B"/>
                <path d="M 90 120 L 125 120 Q 125 160 160 130 Q 195 160 150 195 Q 80 200 90 120 Z" fill="#FF9F43"/>
            </svg>
        </header>

        <h1 class="title">Профили фурӯшанда</h1>
        <p class="subtitle">Маълумотро пур кунед, то муштариён мағозаи шуморо пайдо кунанд.</p>

        <div class="input-group">
            <label>Ном ва Насаб</label>
            <input type="text" id="fullName" placeholder="Масалан: Алишер Сафаров">
        </div>

        <div class="input-group">
            <label>Номи мағоза</label>
            <input type="text" id="shopName" placeholder="Масалан: Bozorcha Center">
        </div>

        <div class="input-group">
            <label>Суроғаи мағоза</label>
            <input type="text" id="shopAddress" placeholder="Масалан: к. Рудакӣ 15">
        </div>

        <button class="btn" id="saveBtn">Сабт ва ворид шудан</button>

        <footer>© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        // Танзимоти Supabase
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        // Танзимоти Telegram Бот
        const BOT_TOKEN = "8732575801:AAHMKSQF8wgs9BeNBhCnFfigzvTmB0iM5Js";
        const ADMIN_ID = "6484601057";

        // Функсияи фиристодани маълумоти пурра ба Telegram
        async function sendProfileNotify(name, shop, address) {
            const userEmail = localStorage.getItem('temp_email') || 'Номаълум';
            const text = `📝 **Профили нави фурӯшанда!**\n\n👤 **Ном:** ${name}\n📧 **Email:** ${userEmail}\n🏪 **Мағоза:** ${shop}\n📍 **Суроға:** ${address}\n⏰ **Вақт:** ${new Date().toLocaleString('tj-TJ')}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: text,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (e) {
                console.error("Хатогӣ ҳангоми фиристодан ба Telegram:", e);
            }
        }

        // Боркунии темаи захирашуда
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
        };

        // Тугмаи Сабт
        document.getElementById('saveBtn').onclick = async () => {
            const fullName = document.getElementById('fullName').value.trim();
            const shopName = document.getElementById('shopName').value.trim();
            const shopAddress = document.getElementById('shopAddress').value.trim();
            const userId = localStorage.getItem('userId');

            // Санҷиши пуррагии майдонҳо
            if (!fullName || !shopName || !shopAddress) {
                alert("Лутфан ҳамаи майдонҳоро пур кунед!");
                return;
            }

            // Санҷиши мавҷудияти ID-и корбар
            if (!userId) {
                alert("Хатогии сессия. Лутфан аз нав ворид шавед.");
                window.location.href = 'step2-email.html';
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "Дар ҳоли сабт...";

            try {
                // Навсозии маълумот дар ҷадвали 'user'
                const { error } = await _supabase
                    .from('user')
                    .upsert({ 
                        id: userId, 
                        full_name: fullName, 
                        shop_name: shopName, 
                        shop_address: shopAddress 
                    });

                if (error) {
                    throw error;
                } else {
                    // Фиристодани хабар ба шумо
                    await sendProfileNotify(fullName, shopName, shopAddress);
                    
                    // Гузариш ба Dashboard
                    alert("Маълумоти шумо қабул шуд!");
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                alert("Хатогӣ ҳангоми сабт: " + err.message);
                btn.disabled = false;
                btn.innerText = "Сабт ва ворид шудан";
            }
        };
    </script>
</body>
</html>
