<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <title>Bozorcha Final Intro</title>
    <style>
        :root {
            --orange: #ff8a3d;
            --gold: #ffca80;
            --white: #ffffff;
            --ease-ae: cubic-bezier(0.16, 1, 0.3, 1); 
        }

        body {
            margin: 0;
            background: #020407;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            overflow: hidden;
        }

        .logo-wrapper {
            width: 500px;
            height: 500px;
            transform-style: preserve-3d;
            animation: final3DSpin 5s var(--ease-ae) forwards;
            animation-delay: 2.8s;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        path {
            fill: transparent !important; /* Ранги авваларо нест мекунем */
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-dasharray: 800;
            stroke-dashoffset: 800;
            opacity: 0;
        }

        @keyframes assemblePart {
            0% {
                opacity: 0;
                transform: translate(var(--moveX), var(--moveY)) scale(0.3) rotate(15deg);
                stroke-dashoffset: 800;
            }
            100% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
                stroke-dashoffset: 0;
            }
        }

        @keyframes fillIn {
            to {
                fill: currentColor !important;
                stroke-width: 0;
            }
        }

        @keyframes final3DSpin {
            0% { transform: rotateY(0deg); }
            40% { transform: rotateY(1080deg) scale(1.2); } 
            100% { transform: rotateY(1080deg) scale(1); }
        }

        .part-1 { color: var(--orange); --moveX: -300px; --moveY: -200px; }
        .part-2 { color: var(--gold);   --moveX: 300px;  --moveY: 100px;  }
        .part-3 { color: var(--white);  --moveX: 0px;    --moveY: 300px;  }

        /* Аниматсия барои ҳар як гурӯҳ бо навбат */
        .part-1 path { animation: assemblePart 1.5s var(--ease-ae) forwards 0.1s, fillIn 0.8s ease forwards 2.0s; }
        .part-2 path { animation: assemblePart 1.5s var(--ease-ae) forwards 0.4s, fillIn 0.8s ease forwards 2.3s; }
        .part-3 path { animation: assemblePart 1.5s var(--ease-ae) forwards 0.7s, fillIn 0.8s ease forwards 2.6s; }
    </style>
</head>
<body>

<div class="logo-wrapper">
    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

        </g>
        <g class="part-3">

        </g>
    </svg>
</div>
