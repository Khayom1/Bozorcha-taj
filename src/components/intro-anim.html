<!DOCTYPE html>
<html lang="tg">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(circle at 50% 40%,#1a1a1a,#000);

overflow:hidden;
}

.scene{
perspective:1200px;
position:relative;
}

.logo{
width:420px;
transform-style:preserve-3d;
}

.energy path{
fill:none;
stroke:#ffffff;
stroke-width:3;
stroke-linecap:round;
stroke-dasharray:2000;
stroke-dashoffset:2000;
}

#cap,
#symbol,
#wave{
opacity:0;
}

#wave{
fill:url(#waveGrad);
}

.light{
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,.25),
transparent
);

transform:skewX(-20deg);
}

</style>
</head>

<body>

<div class="scene">

<div class="light"></div>

<svg class="logo" viewBox="0 0 533 600">

<defs>

<linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#ff6a00"/>
<stop offset="100%" stop-color="#ff2d00"/>
</linearGradient>

</defs>

<!-- energy lines -->

<g class="energy">

<path id="line1" d="M60 100 L260 100 L300 140 L220 140 Z"/>
<path id="line2" d="M240 200 L300 300 L180 300 Z"/>
<path id="line3" d="M300 340 C380 360 420 420 460 480"/>

</g>

<!-- shapes -->

<g id="cap">
<path d="M60 100 L260 100 L300 140 L220 140 Z"/>
</g>

<g id="symbol">
<path d="M240 200 L300 300 L180 300 Z"/>
</g>

<g id="wave">
<path d="M300 340 C380 360 420 420 460 480"/>
</g>

</svg>

</div>

<script>

const tl = gsap.timeline()

// snake draw

tl.to("#line1",{strokeDashoffset:0,duration:1.2,ease:"power3.out"})
.to("#line2",{strokeDashoffset:0,duration:1,ease:"power3.out"},"-=0.8")
.to("#line3",{strokeDashoffset:0,duration:1,ease:"power3.out"},"-=0.8")

// fill

.to("#cap",{opacity:1,duration:.6})
.to("#symbol",{opacity:1,duration:.6})
.to("#wave",{opacity:1,duration:.6})

// 3D finish

.to(".logo",{

rotateX:12,
rotateY:-10,
scale:1.05,
duration:1,
ease:"power2.out"

})

// light sweep

.to(".light",{

left:"120%",
duration:1

},"-=0.6")

</script>

</body>
</html>
