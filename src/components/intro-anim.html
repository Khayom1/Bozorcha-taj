<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozorcha - World's No.1 Logo Animation</title>
    <style>
        :root {
            --gold-light: #ffca80;
            --orange-main: #ff8a3d;
            --orange-deep: #d65a00;
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at 50% 45%, #1a1005 0%, #050505 80%, #000000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1200px;
        }

        /* Зарраҳои тиллоии муваффақият */
        #particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--gold-light) 0%, transparent 75%);
            border-radius: 50%;
            opacity: 0;
            filter: blur(1px);
            animation: floatUp infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.2); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-600px) scale(1.5); opacity: 0; }
        }

        /* Контейнери марказии шоҳасар */
        .stage {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: stageReveal 3s ease-out forwards;
        }

        @keyframes stageReveal {
            0% { opacity: 0; transform: scale(0.9) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* SVG ва Аниматсияҳои ҷузъҳо */
        svg {
            width: 320px; /* Сифати 4K дар ҳама андоза */
            height: auto;
            filter: drop-shadow(0 20px 50px rgba(214, 90, 0, 0.3));
            animation: cinematicFloat 8s ease-in-out infinite;
        }

        /* Эффекти Тулӯи Офтоб барои Хайма */
        #roof-group {
            animation: sunriseReveal 3.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            transform-origin: center;
        }

        @keyframes sunriseReveal {
            0% { transform: translateY(60px) scale(0.8); opacity: 0; filter: blur(20px); }
            100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0px); }
        }

        /* Эффекти Нафаскашии Бозор (Base) */
        #base-group {
            animation: marketBreathe 5s ease-in-out infinite 3.5s;
            transform-origin: center;
        }

        @keyframes marketBreathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.04); filter: brightness(1.2) drop-shadow(0 0 30px rgba(255, 138, 61, 0.6)); }
        }

        @keyframes cinematicFloat {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-15px) rotateX(5deg); }
        }

        /* Дурахши замина */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 138, 61, 0.15) 0%, transparent 70%);
            z-index: -1;
            animation: pulseGlow 6s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 0.8; }
        }
    </style>
</head>
<body>

<div id="particles"></div>

<div class="stage">
    <div class="ambient-glow"></div>
    
    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="premiumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffb76b" />
                <stop offset="50%" stop-color="#ff8a3d" />
                <stop offset="100%" stop-color="#d65a00" />
            </linearGradient>
        </defs>

        <g id="roof-group" fill="url(#premiumGradient)">
            <path d="M485.498 141.401 C 485.498 116.126,464.095 95.826,436.561 94.757 C 401.761 93.407,314.186 92.422,256.000 92.422 C 197.814 92.422,110.239 93.407,75.439 94.757 C 47.905 95.826,26.502 116.126,26.502 141.401 L 26.502 230.141 L 485.498 230.141 L 485.498 141.401 Z" />
            <path d="M26.502 230.141 C 26.502 265.485,55.158 294.141,90.502 294.141 C 125.845 294.141,154.502 265.485,154.502 230.141 L 26.502 230.141 Z" />
            <path d="M192.000 230.141 C 192.000 265.485,220.657 294.141,256.000 294.141 C 291.344 294.141,320.000 265.485,320.000 230.141 L 192.000 230.141 Z" />
            <path d="M357.498 230.141 C 357.498 265.485,386.154 294.141,421.498 294.141 C 456.842 294.141,485.498 265.485,485.498 230.141 L 357.498 230.141 Z" />
        </g>

        <g id="base-group" fill="url(#premiumGradient)">
            <path d="M225.071 310.838 L 225.071 506.422 L 310.422 506.422 C 404.991 506.422,482.498 428.915,482.498 334.347 C 482.498 318.067,480.220 302.320,475.986 287.422 L 401.498 287.422 C 413.435 301.242,420.498 316.326,420.498 334.347 C 420.498 395.148,371.223 444.422,310.422 444.422 L 287.071 444.422 L 287.071 310.838 L 225.071 310.838 Z" />
            <path d="M32.498 262.422 L 32.498 506.422 L 180.334 506.422 C 160.016 470.923,124.966 383.179,124.966 310.838 C 124.966 295.324,126.634 278.490,129.814 262.422 L 32.498 262.422 Z" />
        </g>
    </svg>
</div>

<script>
    // Генератори зарраҳои тиллоӣ барои эффекти зинда
    const container = document.getElementById('particles');
    const count = 50;

    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        
        const size = Math.random() * 5 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 4 + 3;
        const delay = Math.random() * 5;

        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = left + '%';
        p.style.bottom = '-50px';
        p.style.animationDuration = duration + 's';
        p.style.animationDelay = delay + 's';
        
        container.appendChild(p);
    }
</script>

</body>
</html>
