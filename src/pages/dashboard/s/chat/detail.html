<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат - Bozorcha</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --text-muted: #64748b;
            --accent: #ff9800;
            --accent-light: #fff3e0;
            --accent-dark: #f57c00;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient: linear-gradient(135deg, #ff9800, #ff6b6b);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text);
        }

        .back-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .user-status {
            font-size: 12px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .product-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 24px;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .product-price {
            color: var(--accent);
            font-weight: 700;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message.sent {
            background: var(--gradient);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: var(--bg-card);
            border: 1px solid var(--border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }

        .message.sent .message-time {
            color: rgba(255,255,255,0.8);
        }

        .message.received .message-time {
            color: var(--text-muted);
        }

        .message-image {
            max-width: 200px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .message-audio {
            width: 250px;
            margin-bottom: 8px;
        }

        .message-file {
            background: var(--bg);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .input-container {
            padding: 16px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attach-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text);
        }

        .attach-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 30px;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .message-input:focus {
            border-color: var(--accent);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255,152,0,0.4);
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
        </div>
        <div class="user-avatar" id="avatar">...</div>
        <div class="user-info">
            <div class="user-name" id="userName"></div>
            <div class="user-status" id="userStatus"><i class="fas fa-circle"></i> Online</div>
        </div>
    </div>

    <div id="productCard" class="product-card hidden" onclick="viewProduct()">
        <div class="product-image" id="productImage"><i class="fas fa-box"></i></div>
        <div class="product-info">
            <div class="product-name" id="productName"></div>
            <div class="product-price" id="productPrice"></div>
        </div>
    </div>

    <div class="messages-container" id="messages"></div>

    <div class="input-container">
        <div class="attach-btn" onclick="showAttachMenu()">
            <i class="fas fa-paperclip"></i>
        </div>
        <input type="text" class="message-input" id="messageInput" placeholder="Нависед..." onkeypress="checkEnter(event)">
        <div class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </div>
    </div>

    <input type="file" id="fileInput" style="display: none;" onchange="uploadFile()" accept="image/*,audio/*,video/*,.pdf,.doc,.docx,.txt">

    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        // Функсияи муҳофизатӣ барои тоза кардани матн
        function escapeHTML(str) {
            if (!str) return '';
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chat');
        const productId = urlParams.get('product');

        let currentUserId = null;
        let otherUserId = null;
        let messages = [];
        let chatData = null;
        let productData = null;

        window.addEventListener('message', function(event) {
            if (event.data.type === 'theme') {
                document.body.setAttribute('data-theme', event.data.theme);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            // Гирифтани корбари воқеӣ аз Supabase
            const { data: { user }, error } = await _supabase.auth.getUser();

            if (error || !user) {
                window.location.href = 'index.html';
                return;
            }

            currentUserId = user.id;

            // Назорати доимии сессия (Auth Observer)
            _supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_OUT' || !session) {
                    window.location.href = 'index.html';
                }
            });

            await loadChat();
            await loadMessages();
            setupRealtime();
            scrollToBottom();
        });

        async function loadChat() {
            // Маълумоти чат
            const { data: chat } = await _supabase
                .from('chats')
                .select('*')
                .eq('id', chatId)
                .single();
            
            chatData = chat;

            // Гирифтани иштирокчии дигар
            const { data: other } = await _supabase
                .from('chat_participants')
                .select('user_id')
                .eq('chat_id', chatId)
                .neq('user_id', currentUserId)
                .single();

            otherUserId = other.user_id;

            // Маълумоти корбари дигар
            const { data: user } = await _supabase
                .from('user')
                .select('full_name, shop_name')
                .eq('id', otherUserId)
                .single();

            const name = user.full_name || user.shop_name || 'Корбар';
            // Истифодаи escapeHTML барои муҳофизат
            const safeName = escapeHTML(name);
            document.getElementById('userName').innerText = safeName;
            document.getElementById('avatar').innerText = safeName.charAt(0);

            // Агар productId дар URL бошад
            if (productId) {
                const { data: product } = await _supabase
                    .from('products')
                    .select('*')
                    .eq('id', productId)
                    .single();
                
                if (product) {
                    productData = product;
                    document.getElementById('productName').innerText = escapeHTML(product.name);
                    document.getElementById('productPrice').innerText = escapeHTML(product.price) + ' с';
                    document.getElementById('productCard').classList.remove('hidden');
                }
            }
        }

        async function loadMessages() {
            const { data } = await _supabase
                .from('messages')
                .select('*')
                .eq('chat_id', chatId)
                .order('created_at', { ascending: true });

            messages = data || [];
            displayMessages();
        }

        function displayMessages() {
            const container = document.getElementById('messages');
            let html = '';
            let lastDate = '';

            messages.forEach(msg => {
                const date = new Date(msg.created_at).toLocaleDateString();
                if (date !== lastDate) {
                    html += `<div style="text-align:center; font-size:11px; color:var(--text-muted); margin:10px 0;">${escapeHTML(date)}</div>`;
                    lastDate = date;
                }

                const time = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const isMine = msg.user_id === currentUserId;

                let contentHtml = '';
                if (msg.file_url) {
                    if (msg.file_type === 'image') {
                        contentHtml = `<img src="${msg.file_url}" class="message-image" onclick="window.open('${msg.file_url}')">`;
                    } else if (msg.file_type === 'audio') {
                        contentHtml = `<audio controls class="message-audio"><source src="${msg.file_url}"></audio>`;
                    } else {
                        contentHtml = `<div class="message-file"><i class="fas fa-file"></i> <a href="${msg.file_url}" target="_blank">Файл</a></div>`;
                    }
                }
                if (msg.content) {
                    // ИСТИФОДАИ МУҲИМ: escapeHTML барои муҳофизат аз XSS
                    contentHtml += `<div class="message-content">${escapeHTML(msg.content)}</div>`;
                }

                html += `
                    <div class="message ${isMine ? 'sent' : 'received'}">
                        ${contentHtml}
                        <div class="message-time">
                            ${escapeHTML(time)}
                            <span class="message-status">${isMine ? '<i class="fas fa-check"></i>' : ''}</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            scrollToBottom();
        }

        function setupRealtime() {
            _supabase
                .channel(`chat:${chatId}`)
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'messages',
                    filter: `chat_id=eq.${chatId}`
                }, payload => {
                    messages.push(payload.new);
                    displayMessages();
                })
                .subscribe();
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            sendToSupabase({ content: text });
            input.value = '';
        }

        async function sendToSupabase(messageData) {
            const { error } = await _supabase
                .from('messages')
                .insert([{
                    chat_id: chatId,
                    user_id: currentUserId,
                    content: messageData.content || null,
                    file_url: messageData.file_url || null,
                    file_type: messageData.file_type || null
                }]);

            if (error) {
                alert('Хатогӣ: ' + error.message);
            } else {
                // Навсозии last_message дар chats
                await _supabase
                    .from('chats')
                    .update({
                        last_message: messageData.content || 'Файл',
                        last_message_time: new Date()
                    })
                    .eq('id', chatId);
            }
        }

        function checkEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function showAttachMenu() {
            document.getElementById('fileInput').click();
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const fileType = file.type.split('/')[0];
            const fileName = `${Date.now()}_${file.name}`;
            const filePath = `chat/${chatId}/${fileName}`;

            const { error } = await _supabase.storage
                .from('chat-files')
                .upload(filePath, file);

            if (error) {
                alert('Хатогӣ дар боркунии файл: ' + error.message);
                return;
            }

            const { data: { publicUrl } } = _supabase.storage
                .from('chat-files')
                .getPublicUrl(filePath);

            sendToSupabase({
                file_url: publicUrl,
                file_type: fileType
            });

            fileInput.value = '';
        }

        function goBack() {
            window.location.href = 'chat.html';
        }

        function viewProduct() {
            if (productData) {
                window.location.href = `product.html?id=${productData.id}`;
            }
        }

        function scrollToBottom() {
            setTimeout(() => {
                const container = document.getElementById('messages');
                container.scrollTop = container.scrollHeight;
            }, 100);
        }
    </script>
</body>
</html>
