<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozorcha - Дашборд</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="/src/styles/main.css">
    <link rel="stylesheet" href="/src/styles/theme.css">
</head>
<body>
    <!-- Header -->
    <header class="dashboard-header">
        <div class="logo">
            <img src="/public/assets/logo.svg" alt="Bozorcha">
        </div>
        <div class="menu-icon" onclick="goToSettings()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <!-- Content (Dynamic) -->
    <main class="dashboard-content" id="main-content">
        <!-- Default content will be loaded here -->
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="loadPage('home')">
            <span class="icon">🏠</span>
            <span class="label">Асосӣ</span>
        </div>
        <div class="nav-item" onclick="loadPage('chat')">
            <span class="icon">💬</span>
            <span class="label">Паём</span>
        </div>
        <div class="nav-item" onclick="loadPage('cart')">
            <span class="icon">🛒</span>
            <span class="label">Сабад</span>
        </div>
        <div class="nav-item" onclick="loadPage('profile')">
            <span class="icon">👤</span>
            <span class="label">Профил</span>
        </div>
    </nav>

    <!-- JavaScript -->
    <script type="module" src="/src/js/supabase.js"></script>
    <script type="module" src="/src/js/guard.js"></script>
    <script type="module" src="/src/js/utils.js"></script>
    <script type="module" src="/src/js/theme.js"></script>
    <script type="module" src="/src/js/config.js"></script>
    
    <script type="module">
        // Dashboard logic
        import { checkAuth, requireAuth } from '/src/js/guard.js'
        import { supabase } from '/src/js/supabase.js'
        
        // Load default page (home)
        window.addEventListener('DOMContentLoaded', () => {
            loadPage('home')
        })
        
        // Function to load pages
        window.loadPage = async (page) => {
            const contentDiv = document.getElementById('main-content')
            
            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active')
            })
            event.currentTarget.classList.add('active')
            
            // Check if page requires authentication
            const protectedPages = ['chat', 'cart', 'profile']
            
            if (protectedPages.includes(page)) {
                const user = await checkAuth()
                if (!user) {
                    // Save current URL for return after login
                    sessionStorage.setItem('returnUrl', window.location.href)
                    window.location.href = '/src/pages/auth/method.html'
                    return
                }
            }
            
            // Load the page content
            try {
                const response = await fetch(`/src/pages/b/${page}/${page}.html`)
                const html = await response.text()
                contentDiv.innerHTML = html
                
                // Update URL without reload
                history.pushState({page}, '', `#${page}`)
            } catch (error) {
                console.error('Error loading page:', error)
                contentDiv.innerHTML = '<p>Саҳифа бор нашуд</p>'
            }
        }
        
        // Handle browser back/forward
        window.addEventListener('popstate', (event) => {
            const page = location.hash.substring(1) || 'home'
            loadPage(page, false)
        })
        
        // Go to settings
        window.goToSettings = () => {
            window.location.href = '/src/pages/b/settings.html'
        }
    </script>
</body>
</html>
