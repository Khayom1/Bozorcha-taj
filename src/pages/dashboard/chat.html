<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чатҳо - Bozorcha</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --text-muted: #64748b;
            --accent: #ff9800;
            --accent-light: #fff3e0;
            --accent-dark: #f57c00;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient: linear-gradient(135deg, #ff9800, #ff6b6b);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text);
            font-size: 18px;
        }

        .icon-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .search-container {
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .search-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box i {
            color: var(--text-light);
            font-size: 16px;
        }

        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .chat-list {
            padding: 8px 0;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-item:hover {
            background: var(--accent-light);
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .chat-last {
            font-size: 13px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .chat-badge {
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            padding: 0 6px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .empty-state p {
            font-size: 14px;
        }

        .new-chat-btn {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255,152,0,0.4);
            transition: all 0.3s ease;
            z-index: 90;
        }

        .new-chat-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }

        .modal-header i {
            cursor: pointer;
            font-size: 24px;
        }

        .user-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-item:hover {
            background: var(--accent-light);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .user-name {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-title">Чатҳо</div>
        <div class="header-actions">
            <div class="icon-btn" onclick="window.parent.postMessage({ type: 'openSettings' }, '*')">
                <i class="fas fa-cog"></i>
            </div>
        </div>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Ҷустуҷӯи чатҳо...">
        </div>
    </div>

    <div class="chat-list" id="chatList"></div>

    <div class="new-chat-btn" onclick="openNewChatModal()">
        <i class="fas fa-plus"></i>
    </div>

    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Оғози чати нав</span>
                <i class="fas fa-times" onclick="closeModal()"></i>
            </div>
            <div class="search-box" style="margin-bottom: 20px;">
                <i class="fas fa-search"></i>
                <input type="text" id="userSearch" placeholder="Ҷустуҷӯи корбарон..." oninput="searchUsers()">
            </div>
            <div class="user-list" id="userList"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        // Функсияи муҳофизатӣ барои тоза кардани матн
        function escapeHTML(str) {
            if (!str) return '';
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        let currentUserId = null;
        let chats = [];
        let users = [];

        window.addEventListener('message', function(event) {
            if (event.data.type === 'theme') {
                document.body.setAttribute('data-theme', event.data.theme);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            // Гирифтани корбари воқеӣ аз Supabase
            const { data: { user }, error } = await _supabase.auth.getUser();

            if (error || !user) {
                window.location.href = 'index.html';
                return;
            }

            currentUserId = user.id;

            // Назорати доимии сессия (Auth Observer)
            _supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_OUT' || !session) {
                    window.location.href = 'index.html';
                }
            });

            await loadChats();
            setupRealtime();
        });

        async function loadChats() {
            // Гирифтани ҳамаи чатҳое, ки корбар дар онҳо иштирок мекунад
            const { data: participants } = await _supabase
                .from('chat_participants')
                .select('chat_id')
                .eq('user_id', currentUserId);

            if (!participants || participants.length === 0) {
                document.getElementById('chatList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <h3>Ҳеҷ чате нест</h3>
                        <p>Барои оғози чат, тугмаи + -ро пахш кунед.</p>
                    </div>
                `;
                return;
            }

            const chatIds = participants.map(p => p.chat_id);

            const { data: chatsData } = await _supabase
                .from('chats')
                .select('*')
                .in('id', chatIds)
                .order('last_message_time', { ascending: false });

            chats = chatsData || [];
            
            // Барои ҳар чат, номи корбари дигарро гирем
            for (let chat of chats) {
                const { data: otherParticipant } = await _supabase
                    .from('chat_participants')
                    .select('user_id')
                    .eq('chat_id', chat.id)
                    .neq('user_id', currentUserId)
                    .single();

                if (otherParticipant) {
                    const { data: user } = await _supabase
                        .from('user')
                        .select('full_name, shop_name')
                        .eq('id', otherParticipant.user_id)
                        .single();
                    
                    chat.otherUser = user;
                }
            }

            displayChats();
        }

        function displayChats() {
            const container = document.getElementById('chatList');
            
            if (chats.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <h3>Ҳеҷ чате нест</h3>
                        <p>Барои оғози чат, тугмаи + -ро пахш кунед.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            chats.forEach(chat => {
                const otherName = chat.otherUser?.full_name || chat.otherUser?.shop_name || 'Корбар';
                // Истифодаи escapeHTML барои муҳофизат аз ҳамлаҳои XSS
                const safeName = escapeHTML(otherName);
                const lastTime = chat.last_message_time ? new Date(chat.last_message_time).toLocaleTimeString('tg', { hour: '2-digit', minute: '2-digit' }) : '';
                
                html += `
                    <div class="chat-item" onclick="openChat('${chat.id}')">
                        <div class="chat-avatar">
                            ${safeName.charAt(0)}
                        </div>
                        <div class="chat-info">
                            <div class="chat-row">
                                <span class="chat-name">${safeName}</span>
                                <span class="chat-time">${lastTime}</span>
                            </div>
                            <div class="chat-row">
                                <span class="chat-last">${escapeHTML(chat.last_message || '...')}</span>
                                <span class="chat-badge" style="${!chat.unread ? 'display:none' : ''}">${chat.unread || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function setupRealtime() {
            // Барои паёмҳои нав
            _supabase
                .channel('public:messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const newMessage = payload.new;
                    // Агар ин паём ба яке аз чатҳои мо тааллуқ дошта бошад
                    if (chats.some(c => c.id === newMessage.chat_id)) {
                        loadChats(); // Аз нав бор кун
                    }
                })
                .subscribe();
        }

        function openChat(chatId) {
            window.location.href = `chat-detail.html?chat=${chatId}`;
        }

        async function openNewChatModal() {
            // Боркунии рӯйхати корбарон
            const { data } = await _supabase
                .from('user')
                .select('id, full_name, shop_name')
                .neq('id', currentUserId);

            users = data || [];
            displayUsers();
            document.getElementById('newChatModal').classList.add('open');
        }

        function displayUsers(filter = '') {
            const container = document.getElementById('userList');
            const filtered = users.filter(u => 
                (u.full_name || u.shop_name || '').toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Корбаре ёфт нашуд</div>';
                return;
            }

            let html = '';
            filtered.forEach(user => {
                const name = user.full_name || user.shop_name || 'Корбар';
                // Истифодаи escapeHTML барои муҳофизат
                const safeName = escapeHTML(name);
                html += `
                    <div class="user-item" onclick="startChat('${user.id}')">
                        <div class="user-avatar">${safeName.charAt(0)}</div>
                        <span class="user-name">${safeName}</span>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function searchUsers() {
            const filter = document.getElementById('userSearch').value;
            displayUsers(filter);
        }

        async function startChat(otherUserId) {
            // Санҷидани оё чат байни ин ду корбар аллакай вуҷуд дорад
            const { data: existing } = await _supabase
                .rpc('get_chat_between_users', { user1: currentUserId, user2: otherUserId });

            let chatId;
            if (existing && existing.length > 0) {
                chatId = existing[0].chat_id;
            } else {
                // Сохтани чати нав
                const { data: newChat } = await _supabase
                    .from('chats')
                    .insert({})
                    .select()
                    .single();

                chatId = newChat.id;

                // Илова кардани иштирокчиён
                await _supabase
                    .from('chat_participants')
                    .insert([
                        { chat_id: chatId, user_id: currentUserId },
                        { chat_id: chatId, user_id: otherUserId }
                    ]);
            }

            closeModal();
            openChat(chatId);
        }

        function closeModal() {
            document.getElementById('newChatModal').classList.remove('open');
        }
    </script>
</body>
</html>
