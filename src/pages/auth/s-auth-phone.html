<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сабти ном бо телефон - Bozorcha</title>
    
    <meta name="description" content="Сабти ном дар Bozorcha тавассути рақами телефон">
    
    <!-- Пайваст кардани шрифтҳо -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Пайваст кардани файлҳои CSS -->
    <link rel="stylesheet" href="../src/styles/main.css">
    <link rel="stylesheet" href="../src/styles/theme.css">
    
    <!-- Пайваст кардани файлҳои JavaScript -->
    <script src="../src/js/config.js" defer></script>
    <script src="../src/js/i18n.js" defer></script>
    <script src="../src/js/theme.js" defer></script>
    <script src="../src/js/utils.js" defer></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .back-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .back-btn:hover {
            background: #FF9F43;
            border-color: #FF9F43;
            transform: scale(1.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area svg {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 10px 20px rgba(255, 159, 67, 0.3));
        }

        .logo-area span {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF9F43, #FF6B6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: #FF9F43;
            border-color: #FF9F43;
            transform: scale(1.05);
        }

        /* Title */
        .auth-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-title h1 {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
        }

        .auth-title p {
            color: #94A3B8;
            font-size: 15px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #94A3B8;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
        }

        .phone-input-wrapper:focus-within {
            border-color: #FF9F43;
            box-shadow: 0 0 0 3px rgba(255, 159, 67, 0.2);
        }

        .country-code {
            padding: 16px 12px 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-weight: 600;
            font-size: 16px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .phone-input {
            flex: 1;
            padding: 16px 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .phone-input::placeholder {
            color: #64748B;
        }

        .error-message {
            color: #EF4444;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF9F43, #FF6B6B);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0 16px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .submit-btn.loading {
            position: relative;
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Login Link */
        .login-link {
            text-align: center;
            color: #94A3B8;
            font-size: 14px;
        }

        .login-link a {
            color: #FF9F43;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Footer */
        .auth-footer {
            margin-top: 30px;
            text-align: center;
            color: #64748B;
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            .auth-title h1 { font-size: 24px; }
            .phone-input { padding: 14px 16px; }
            .country-code { padding: 14px 10px 14px 16px; }
        }
    </style>
</head>
<body data-theme="light">
    <div class="auth-card">
        <!-- Header -->
        <header class="auth-header">
            <a href="choose-method.html" class="back-btn" aria-label="Back to choose method">←</a>
            
            <div class="logo-area">
                <svg width="40" height="40" viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FF9F43"/>
                            <stop offset="100%" stop-color="#FF6B6B"/>
                        </linearGradient>
                    </defs>
                    <path d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="url(#logoGradient)"/>
                </svg>
                <span>Bozorcha</span>
            </div>

            <div class="header-actions">
                <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">☀️</button>
            </div>
        </header>

        <!-- Title -->
        <div class="auth-title">
            <h1>Сабти ном бо телефон</h1>
            <p>Рақами телефони худро ворид кунед</p>
        </div>

        <!-- Form -->
        <div class="form-group">
            <label for="phoneInput" class="form-label">Рақами телефон</label>
            <div class="phone-input-wrapper">
                <span class="country-code">+992</span>
                <input type="tel" id="phoneInput" class="phone-input" placeholder="00 000 00 00" maxlength="12" aria-label="Phone number">
            </div>
            <div id="phoneError" class="error-message">Рақам бояд 9 рақам бошад</div>
        </div>

        <button class="submit-btn" id="submitBtn">Фиристодани код</button>

        <div class="login-link">
            Аллакай ҳисоб доред?
            <a href="login.html">Ворид шавед</a>
        </div>

        <div class="auth-footer">
            © 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.
        </div>
    </div>

    <script>
        // ========== ТАНЗИМИ SUPABASE ==========
        const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        
        // ========== ТАНЗИМИ МАВЗӮЪ (THEME) ==========
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerText = savedTheme === 'light' ? '☀️' : '🌙';
        }
        
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'light' ? '☀️' : '🌙';
        }
        
        // ========== ФОРМАТКУНИИ РАҚАМИ ТЕЛЕФОН ==========
        function formatPhoneNumber(input) {
            let digits = input.replace(/\D/g, '');
            if (digits.length > 9) digits = digits.slice(0, 9);
            let formatted = '';
            for (let i = 0; i < digits.length; i++) {
                if (i === 3 || i === 6) formatted += ' ';
                formatted += digits[i];
            }
            return formatted;
        }
        
        // ========== САНҶИШИ ЭЪТИБОРНОКИИ РАҚАМ ==========
        function validatePhone(phoneDigits) {
            return phoneDigits.length === 9;
        }
        
        // ========== ФИРИСТОДАНИ OTP ==========
        async function sendOtp(phoneNumber) {
            const { error } = await supabase.auth.signInWithOtp({
                phone: phoneNumber,
                options: { shouldCreateUser: true }
            });
            if (error) throw error;
        }
        
        // ========== EVENT LISTENERS ==========
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            
            const themeBtn = document.getElementById('themeBtn');
            const phoneInput = document.getElementById('phoneInput');
            const submitBtn = document.getElementById('submitBtn');
            const phoneError = document.getElementById('phoneError');
            
            // Тугмаи мавзӯъ
            themeBtn.addEventListener('click', toggleTheme);
            
            // Форматкунии рақами телефон
            phoneInput.addEventListener('input', function(e) {
                const formatted = formatPhoneNumber(e.target.value);
                e.target.value = formatted;
                phoneError.classList.remove('show');
            });
            
            // Тугмаи фиристодан
            submitBtn.addEventListener('click', async function() {
                const rawValue = phoneInput.value.replace(/\D/g, '');
                
                if (!validatePhone(rawValue)) {
                    phoneError.classList.add('show');
                    return;
                }
                
                const fullPhone = '+992' + rawValue;
                
                submitBtn.disabled = true;
                submitBtn.classList.add('loading');
                
                try {
                    await sendOtp(fullPhone);
                    localStorage.setItem('temp_phone', fullPhone);
                    window.location.href = 'verify-phone.html?phone=' + encodeURIComponent(fullPhone);
                } catch (error) {
                    phoneError.innerText = error.message || 'Хатогӣ рух дод. Аз нав кӯшиш кунед.';
                    phoneError.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('loading');
                }
            });
            
            // Фиристодан бо Enter
            phoneInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitBtn.click();
                }
            });
        });
    </script>
</body>
</html>
