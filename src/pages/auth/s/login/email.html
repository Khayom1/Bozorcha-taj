<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Воридшавӣ барои фурӯшандагон - Bozorcha</title>
    <link rel="stylesheet" href="/src/styles/main.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        
        .auth-card {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header .role-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .auth-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #28a745;
        }
        
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .auth-btn:hover {
            background: #218838;
        }
        
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-links a {
            color: #28a745;
            text-decoration: none;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        
        .auth-divider span {
            padding: 0 10px;
            color: #999;
            font-size: 14px;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .back-btn:hover {
            color: #333;
        }
        
        /* Тёмная тема */
        .theme-dark .auth-card {
            background: #2d2d2d;
        }
        
        .theme-dark .auth-header h2 {
            color: #fff;
        }
        
        .theme-dark .auth-header p {
            color: #bbb;
        }
        
        .theme-dark .form-group label {
            color: #ddd;
        }
        
        .theme-dark .form-group input {
            background: #3d3d3d;
            border-color: #4d4d4d;
            color: #fff;
        }
        
        .theme-dark .back-btn {
            color: #bbb;
        }
        
        .theme-dark .back-btn:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <button class="back-btn" onclick="window.location.href='/src/pages/dashboard/s/dashboard.html'">← Ба дашборд</button>
            
            <div class="auth-header">
                <span class="role-badge">Фурӯшанда</span>
                <h2>Ба ҳисоби фурӯшанда ворид шавед</h2>
                <p>Барои идоракунии маҳсулот ва фармоишҳо</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Почтаи электронӣ</label>
                    <input type="email" id="email" placeholder="seller@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Парол</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                
                <button type="submit" class="auth-btn" id="submitBtn">Воридшавӣ</button>
            </form>
            
            <div class="auth-divider">
                <span>ё</span>
            </div>
            
            <div class="auth-links">
                <a href="#" onclick="goToPhone()">Бо рақами телефон ворид шавед</a>
                <br><br>
                <a href="#" onclick="goToRegister()">Ҳисоб надоред? Ҳамчун фурӯшанда сабти ном кунед</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { signInWithEmail } from '/src/js/supabase.js'
        import { handlePostAuth } from '/src/js/guard.js'
        
        window.goToPhone = () => {
            window.location.href = '/src/pages/auth/s/login/phone.html'
        }
        
        window.goToRegister = () => {
            window.location.href = '/src/pages/auth/s/register/form.html'
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const submitBtn = document.getElementById('submitBtn')
            const errorDiv = document.getElementById('errorMessage')
            
            errorDiv.style.display = 'none'
            submitBtn.disabled = true
            submitBtn.textContent = 'Интизор шавед...'
            
            try {
                const { data, error } = await signInWithEmail(email, password)
                
                if (error) {
                    throw error
                }
                
                document.getElementById('successMessage').textContent = 'Воридшавӣ муваффақ шуд!'
                document.getElementById('successMessage').style.display = 'block'
                
                // Ба дашборди фурӯшанда равон кун
                setTimeout(() => {
                    handlePostAuth()
                }, 1000)
                
            } catch (error) {
                errorDiv.textContent = error.message || 'Почта ё парол нодуруст аст'
                errorDiv.style.display = 'block'
                submitBtn.disabled = false
                submitBtn.textContent = 'Воридшавӣ'
            }
        })
    </script>
</body>
</html>
