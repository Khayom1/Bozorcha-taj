<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фурӯшанда - метод</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #ff9500; margin-bottom: 30px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #ff9500;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Фурӯшанда</h1>
        
        <button class="btn" onclick="window.location.href='login/phone.html'">Воридшавӣ бо телефон</button>
        <button class="btn" onclick="window.location.href='login/email.html'">Воридшавӣ бо почта</button>
        <button class="btn" onclick="window.location.href='register/phone.html'">Сабти ном бо телефон</button>
        <button class="btn" onclick="window.location.href='register/email.html'">Сабти ном бо почта</button>
        
        <a href="/index.html" class="back-btn">← Бозгашт</a>
    </div>
</body>
</html>
