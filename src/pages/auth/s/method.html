<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интихоби усул - Bozorcha (фурӯшанда)</title>
    
    <!-- JavaScript files -->
    <script src="/src/js/config.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/src/js/supabase.js"></script>
    <script src="/src/js/theme.js"></script>
    <script src="/src/js/i18n.js"></script>
    <script src="/src/js/utils.js"></script>
    <script src="/src/js/guard.js"></script>
    
    <style>
        /* Танҳо стилҳои оддӣ барои намоёнии тугмаҳо */
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #ff9500;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #ff9500;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ff9500;
            color: #ff9500;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bozorcha - Фурӯшанда</h1>
        <p style="margin-bottom: 30px; color: #94a3b8;">Усули воридшавиро интихоб кунед</p>
        
        <button class="btn" onclick="window.location.href='login/phone.html'">Ворид шудан бо телефон</button>
        <button class="btn" onclick="window.location.href='login/email.html'">Ворид шудан бо почта</button>
        <button class="btn btn-outline" onclick="window.location.href='register/phone.html'">Сабти ном бо телефон</button>
        <button class="btn btn-outline" onclick="window.location.href='register/email.html'">Сабти ном бо почта</button>
        
        <a href="/index.html" class="back-btn">← Бозгашт ба саҳифаи асосӣ</a>
    </div>
</body>
</html>
