<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вуруд ба кабинет — Bozorcha</title>
</head>
<body>
    <div class="login-selection">
        <h1>🔑 Воридшавӣ</h1>
        <p>Усули ворид шуданро интихоб кунед:</p>

        <button id="btn-email" style="display: block; width: 100%; padding: 20px; margin-bottom: 15px; cursor: pointer;">
            📧 Бо почтаи электронӣ (Email)
        </button>

        <button id="btn-phone" style="display: block; width: 100%; padding: 20px; cursor: pointer;">
            📱 Бо рақами телефон
        </button>

        <br>
        <button onclick="history.back()">← Бозгашт</button>
    </div>

    <script>
        // Истифодаи роҳҳое (paths), ки ту фармоиш додӣ:
        
        document.getElementById('btn-email').addEventListener('click', () => {
            window.location.href = "email.html"; 
        });

        document.getElementById('btn-phone').addEventListener('click', () => {
            window.location.href = "phone.html";
        });
    </script>
</body>
</html>
