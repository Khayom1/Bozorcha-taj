
<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пур кардани профил - Bozorcha</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-primary: #1A1C1E;
            --text-secondary: #6C757D;
            --accent-gradient: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            --border: #EEEEEE;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --surface: #161618;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --border: #2C2E33;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg); 
            color: var(--text-primary);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            padding: 20px;
        }

        .card {
            background: var(--surface); 
            border-radius: 35px; 
            padding: 40px 30px;
            box-shadow: var(--shadow); 
            border: 1px solid var(--border);
            max-width: 500px; 
            width: 100%;
        }

        header { display: flex; align-items: center; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; font-size: 20px; color: var(--text-primary);
        }

        .title { font-size: 24px; font-weight: 800; margin-top: 15px; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .form-group input {
            width: 100%; padding: 15px; background: var(--bg); 
            border: 2px solid var(--border); border-radius: 16px; 
            font-size: 16px; color: var(--text-primary); outline: none;
        }
        .form-group input:focus { border-color: #FF9F43; }

        #map {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            margin-top: 10px;
            z-index: 1;
        }

        .selected-address {
            background: rgba(255, 159, 67, 0.1);
            padding: 15px; border-radius: 12px; margin-top: 15px;
            font-size: 14px; border-left: 4px solid #FF9F43;
            word-break: break-word;
        }

        .btn {
            width: 100%; padding: 18px; border-radius: 20px;
            font-size: 16px; font-weight: 700; border: none; 
            cursor: pointer; margin-top: 10px;
        }
        .btn-primary { background: var(--accent-gradient); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        footer { margin-top: 40px; color: var(--text-secondary); font-size: 12px; text-align: center; }
        .required::after { content: " *"; color: #ff4444; }

        .awning-part { transform-origin: top center; animation: windSwing 3s ease-in-out infinite; }
        @keyframes windSwing { 
            0%, 100% { transform: rotate(0deg); } 
            50% { transform: rotate(3deg); } 
        }
    </style>
</head>
<body data-theme="light">
    <div class="card">
        <header>
            <div class="header-left">
                <button class="back-btn" onclick="history.back()">←</button>
                <svg width="45" height="45" viewBox="0 0 200 200">
                    <path class="awning-part" d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="#f4ce9b"/>
                    <path d="M 25 105 Q 65 140 25 195 L 25 105 Z" fill="#eea54a"/>
                    <path d="M 90 120 L 125 120 Q 125 160 160 130 Q 195 160 150 195 Q 80 200 90 120 Z" fill="#e45d27"/>
                </svg>
            </div>
        </header>

        <h1 class="title">Маълумоти профил</h1>
        <p class="subtitle">Барои идома, маълумоти худро ворид кунед</p>

        <div class="form-group">
            <label class="required">Ном</label>
            <input type="text" id="name" placeholder="Аҳмад">
        </div>
        
        <div class="form-group">
            <label>Насаб (ихтиёрӣ)</label>
            <input type="text" id="surname" placeholder="Раҳимов">
        </div>
        
        <div class="form-group">
            <label class="required">Номи мағоза</label>
            <input type="text" id="shopName" placeholder="Мағозаи ман">
        </div>
        
        <div class="form-group">
            <label class="required">Ҷойгиршавии мағоза</label>
            <div id="map"></div>
            <div id="selectedAddress" class="selected-address">Суроға интихоб нашудааст</div>
        </div>

        <button class="btn btn-primary" id="submitBtn">Сабт кардан</button>
        <footer>© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
        (function() {
            'use strict';

            // ========== КОНФИГУРАТСИЯ ==========
            const SUPABASE_URL = 'https://seagtlaujnnhoyitgsdd.supabase.co';
            const SUPABASE_KEY = 'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP';
            
            // 🟢 ТОКЕНИ TELEGRAM (ИВАЗ КУНЕД)
            const TELEGRAM_TOKEN = '8732575801:AAHMKSQF8wgs9BeNBhCnFfigzvTmB0iM5Js'; // Иваз бо токени худ
            const TELEGRAM_CHAT_ID = '6484601057'; // ID-и шумо
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            let map, marker;
            let selectedLocation = { lat: 38.5736, lng: 68.7864 }; // Душанбе
            let selectedAddressText = '';
            let isAddressSelected = false;

            // ========== ФУНКСИЯ БАРОИ ФИРИСТОДАН БА TELEGRAM ==========
            async function sendToTelegram(message, type = 'info') {
                const icons = {
                    info: 'ℹ️',
                    success: '✅',
                    warning: '⚠️',
                    error: '❌',
                    user: '👤',
                    shop: '🏪'
                };
                
                const icon = icons[type] || icons.info;
                const fullMessage = `${icon} <b>Bozorcha Monitor</b>\n${message}\n🕐 ${new Date().toLocaleString('tj-TJ')}`;
                
                try {
                    const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
                    await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: fullMessage,
                            parse_mode: 'HTML'
                        })
                    });
                    console.log('Паём ба Telegram фиристода шуд');
                } catch (e) {
                    console.error('Хато дар фиристодан ба Telegram:', e);
                }
            }

            // ========== ГИРИФТАНИ IP ВА МАЪЛУМОТИ БРАУЗЕР ==========
            async function getUserInfo() {
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    
                    return {
                        ip: ipData.ip,
                        browser: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                    };
                } catch (e) {
                    return {
                        ip: 'Номаълум',
                        browser: navigator.userAgent,
                        platform: navigator.platform,
                        language: navigator.language
                    };
                }
            }

            // ========== ГИРИФТАНИ МАЪЛУМОТИ КОРБАРИ ВОРИДШУДА ==========
            async function getCurrentUser() {
                const { data: { user } } = await supabase.auth.getUser();
                return user;
            }

            // ========== ЛОГИРОВАНИИ АМАЛҲО ==========
            async function logAction(action, details = {}) {
                const user = await getCurrentUser();
                const userInfo = await getUserInfo();
                
                let message = '';
                
                if (user) {
                    message += `👤 Корбар: ${user.email || user.id}\n`;
                    message += `🆔 ID: ${user.id}\n`;
                } else {
                    message += `👤 Корбар: Вориднашуда\n`;
                }
                
                message += `⚡ Амал: ${action}\n`;
                
                if (Object.keys(details).length > 0) {
                    message += `📋 Маълумот:\n`;
                    for (let [key, value] of Object.entries(details)) {
                        if (typeof value === 'object') value = JSON.stringify(value);
                        message += `   • ${key}: ${value}\n`;
                    }
                }
                
                message += `🌐 IP: ${userInfo.ip}\n`;
                message += `💻 Браузер: ${userInfo.browser.substring(0, 50)}...\n`;
                message += `📱 Платформа: ${userInfo.platform}\n`;
                message += `🌍 Забон: ${userInfo.language}`;
                
                await sendToTelegram(message, 'user');
            }

            // ========== ФУНКСИЯҲОИ ХАРИТА ==========
            function initMap() {
                try {
                    map = L.map('map').setView([selectedLocation.lat, selectedLocation.lng], 13);
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(map);

                    marker = L.marker([selectedLocation.lat, selectedLocation.lng], {
                        draggable: true
                    }).addTo(map);

                    if (L.Control.Geocoder) {
                        L.Control.geocoder({
                            defaultMarkGeocode: false,
                            placeholder: 'Ҷустуҷӯи суроға...',
                            errorMessage: 'Ёфт нашуд'
                        }).on('markgeocode', function(e) {
                            const center = e.geocode.center;
                            marker.setLatLng(center);
                            map.setView(center, 16);
                            updateLocation(center.lat, center.lng, e.geocode.name);
                        }).addTo(map);
                    }

                    marker.on('dragend', function(e) {
                        const pos = e.target.getLatLng();
                        reverseGeocode(pos.lat, pos.lng);
                    });

                    map.on('click', function(e) {
                        marker.setLatLng(e.latlng);
                        reverseGeocode(e.latlng.lat, e.latlng.lng);
                    });

                    setTimeout(() => map.invalidateSize(), 500);

                } catch (err) {
                    console.error('Хато дар инициализатсияи харита:', err);
                    document.getElementById('selectedAddress').innerHTML = 'Хато дар боркунии харита';
                }
            }

            async function reverseGeocode(lat, lng) {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=tg`);
                    const data = await res.json();
                    updateLocation(lat, lng, data.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`);
                } catch (e) {
                    updateLocation(lat, lng, `${lat.toFixed(4)}, ${lng.toFixed(4)}`);
                }
            }

            function updateLocation(lat, lng, text) {
                selectedLocation = { lat, lng };
                selectedAddressText = text;
                isAddressSelected = true;
                document.getElementById('selectedAddress').innerHTML = `<strong>Суроға:</strong> ${text}`;
            }

            // ========== САБТИ ПРОФИЛ ==========
            async function saveProfile() {
                const name = document.getElementById('name').value.trim();
                const surname = document.getElementById('surname').value.trim();
                const shopName = document.getElementById('shopName').value.trim();
                const submitBtn = document.getElementById('submitBtn');

                if (!name) return alert("Номро ворид кунед");
                if (!shopName) return alert("Номи мағозаро ворид кунед");
                if (!isAddressSelected) return alert("Суроғаро дар харита интихоб кунед");

                submitBtn.disabled = true;
                submitBtn.innerText = "Сабт...";

                try {
                    const user = await getCurrentUser();
                    
                    if (!user) {
                        alert("Шумо ворид нашудаед!");
                        window.location.href = 'login.html';
                        return;
                    }

                    const updates = {
                        full_name: surname ? `${name} ${surname}` : name,
                        shop_name: shopName,
                        shop_address: JSON.stringify({
                            full_address: selectedAddressText,
                            coordinates: selectedLocation
                        })
                    };

                    const { error } = await supabase
                        .from('user')
                        .update(updates)
                        .eq('id', user.id);

                    if (error) throw error;

                    // Логированиеи муваффақият
                    await logAction('Сабти профил', {
                        full_name: updates.full_name,
                        shop_name: shopName,
                        address: selectedAddressText
                    });

                    alert("Маълумот бомуваффақият сабт шуд!");
                    window.location.href = 'dashboard.html';
                } catch (err) {
                    await logAction('Хатогӣ дар сабти профил', { error: err.message });
                    alert("Хатогӣ: " + err.message);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Сабт кардан";
                }
            }

            // ========== БОРКУНИИ АВВАЛИН ==========
            document.addEventListener('DOMContentLoaded', async () => {
                initMap();
                document.getElementById('submitBtn').addEventListener('click', saveProfile);

                // Логированиеи воридшавӣ
                const user = await getCurrentUser();
                if (user) {
                    await logAction('Ворид шуд ба саҳифаи профил', {
                        email: user.email,
                        method: 'profile_page'
                    });
                }
            });
        })();
    </script>
</body>
</html>
