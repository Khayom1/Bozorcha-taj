<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тасдиқи почта - Bozorcha</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-primary: #1A1C1E;
            --text-secondary: #6C757D;
            --accent-gradient: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            --border: #EEEEEE;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --surface: #161618;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --border: #2C2E33;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }

        body {
            background-color: var(--bg); color: var(--text-primary);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        /* Аниматсияи Логотип */
        .awning-part { transform-origin: top center; animation: windSwing 3s ease-in-out infinite; }
        @keyframes windSwing { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg) skewX(2deg); } }

        .card {
            background: var(--surface); border-radius: 35px; padding: 40px 30px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            max-width: 400px; width: 100%; position: relative; text-align: center;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: var(--text-primary);
        }

        .controls { display: flex; gap: 8px; }
        .icon-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 18px; position: relative; overflow: hidden;
        }

        /* Стилҳои ивази тема */
        .theme-icon-box { position: relative; width: 20px; height: 20px; }
        .sun, .moon { position: absolute; inset: 0; transition: all 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        [data-theme="light"] .sun { transform: translateY(0); opacity: 1; }
        [data-theme="light"] .moon { transform: translateY(25px); opacity: 0; }
        [data-theme="dark"] .sun { transform: translateY(-25px); opacity: 0; }
        [data-theme="dark"] .moon { transform: translateY(0); opacity: 1; }

        .title { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: left; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; text-align: left; line-height: 1.4; }

        .input-group { margin-bottom: 10px; text-align: left; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        
        .custom-input {
            display: flex; align-items: center; background: var(--bg);
            border: 2px solid var(--border); border-radius: 20px;
            padding: 5px;
        }
        .custom-input:focus-within { border-color: #FF9F43; }
        .custom-input input { 
            flex: 1; padding: 15px; border: none; outline: none; 
            background: transparent; color: var(--text-primary); 
            font-size: 16px; font-weight: 600; 
        }

        /* Махсус барои OTP */
        .otp-input { text-align: center; letter-spacing: 8px; font-size: 22px !important; }

        .btn {
            width: 100%; padding: 20px; border-radius: 20px;
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            margin-top: 20px; transition: transform 0.2s, opacity 0.3s;
        }
        .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2); }
        .btn-primary:disabled { opacity: 0.5; pointer-events: none; }

        #otp-section { display: none; }

        .success-message { color: #10b981; font-size: 14px; text-align: center; margin-top: 20px; display: none; }
        .error-message { color: #ff4444; font-size: 13px; text-align: left; margin-top: 5px; display: none; }

        footer { margin-top: 40px; color: var(--text-secondary); font-size: 12px; }
    </style>
</head>
<body data-theme="light">
    <div class="card">
        <header>
            <div class="header-left">
                <button class="back-btn" onclick="location.reload()">←</button>
                <svg width="45" height="45" viewBox="0 0 200 200">
                    <path class="awning-part" d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="#f4ce9b"/>
                    <path d="M 25 105 Q 65 140 25 195 L 25 105 Z" fill="#eea54a"/>
                    <path d="M 90 120 L 125 120 Q 125 160 160 130 Q 195 160 150 195 Q 80 200 90 120 Z" fill="#e45d27"/>
                </svg>
            </div>
            <div class="controls">
                <button class="icon-btn" id="themeBtn">
                    <div class="theme-icon-box">
                        <span class="sun">☀️</span>
                        <span class="moon">🌙</span>
                    </div>
                </button>
            </div>
        </header>

        <div id="email-section">
            <h1 class="title">Воридшавӣ</h1>
            <p class="subtitle">Почтаи электронии худро ворид кунед, то коди тасдиқро фиристем.</p>
            <div class="input-group">
                <div class="custom-input">
                    <input type="email" id="email" placeholder="example@mail.com">
                </div>
                <div id="email-error" class="error-message">Почтаи электронӣ нодуруст аст</div>
            </div>
            <button class="btn btn-primary" id="sendBtn">Фиристодани код</button>
        </div>

        <div id="otp-section">
            <h1 class="title">Тасдиқи код</h1>
            <p class="subtitle">Коди 6-рақамаеро, ки ба почтаи шумо фиристодем, ворид кунед.</p>
            <div class="input-group">
                <div class="custom-input">
                    <input type="text" id="otp" class="otp-input" placeholder="000000" maxlength="6">
                </div>
                <div id="otp-error" class="error-message">Код бояд 6 рақам бошад</div>
            </div>
            <button class="btn btn-primary" id="verifyBtn">Тасдиқ кардан</button>
            <p class="success-message" id="success-msg">Код тасдиқ шуд! Гузариш...</p>
        </div>

        <footer>© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        const emailInput = document.getElementById('email');
        const otpInput = document.getElementById('otp');
        const sendBtn = document.getElementById('sendBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const emailSection = document.getElementById('email-section');
        const otpSection = document.getElementById('otp-section');

        // Тема
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
        };

        document.getElementById('themeBtn').onclick = () => {
            const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };

        // Фиристодани код (OTP)
        sendBtn.onclick = async () => {
            const email = emailInput.value.trim();
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('email-error').style.display = 'block';
                return;
            }

            sendBtn.disabled = true;
            sendBtn.innerText = "Фиристода истодаем...";

            try {
                const { error } = await _supabase.auth.signInWithOtp({ email });

                if (error) {
                    alert("Хатогӣ: " + error.message);
                    sendBtn.disabled = false;
                    sendBtn.innerText = "Фиристодани код";
                } else {
                    localStorage.setItem('temp_email', email);
                    emailSection.style.display = 'none';
                    otpSection.style.display = 'block';
                }
            } catch (err) {
                alert("Хатои шабака");
                sendBtn.disabled = false;
            }
        };

        // Тасдиқи код
        verifyBtn.onclick = async () => {
            const token = otpInput.value.trim();
            const email = localStorage.getItem('temp_email');

            if (token.length !== 6) {
                document.getElementById('otp-error').style.display = 'block';
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.innerText = "Санҷида истодаем...";

            try {
                const { data, error } = await _supabase.auth.verifyOtp({
                    email: email,
                    token: token,
                    type: 'magiclink' // Супабейс барои OTP-и почта инро истифода мебарад
                });

                if (error) {
                    alert("Код нодуруст аст ё вақташ гузаштааст");
                    verifyBtn.disabled = false;
                    verifyBtn.innerText = "Тасдиқ кардан";
                } else {
                    document.getElementById('success-msg').style.display = 'block';
                    localStorage.setItem('userId', data.user.id);
                    
                    // Гузариш ба саҳифаи пур кардани профил
                    setTimeout(() => {
                        window.location.href = 'profile-form.html';
                    }, 1500);
                }
            } catch (err) {
                alert("Хатои техникӣ");
                verifyBtn.disabled = false;
            }
        };

        // Тоза кардани хатогиҳо ҳангоми навиштан
        emailInput.oninput = () => document.getElementById('email-error').style.display = 'none';
        otpInput.oninput = () => document.getElementById('otp-error').style.display = 'none';
    </script>
</body>
</html>
