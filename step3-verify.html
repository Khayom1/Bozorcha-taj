<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тасдиқи код - Bozorcha</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-primary: #1A1C1E;
            --text-secondary: #6C757D;
            --accent-gradient: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            --border: #EEEEEE;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --surface: #161618;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --border: #2C2E33;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }

        body {
            background-color: var(--bg); color: var(--text-primary);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .awning-part { transform-origin: top center; animation: windSwing 3s ease-in-out infinite; }
        @keyframes windSwing { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg) skewX(2deg); } }

        .card {
            background: var(--surface); border-radius: 35px; padding: 40px 30px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            max-width: 400px; width: 100%; position: relative; text-align: center;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .header-left { display: flex; align-items: center; gap: 12px; }

        .back-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: var(--text-primary);
        }

        .controls { display: flex; gap: 8px; }
        .icon-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 18px; position: relative; overflow: hidden;
        }

        .theme-icon-box { position: relative; width: 20px; height: 20px; }
        .sun, .moon { position: absolute; inset: 0; transition: all 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        [data-theme="light"] .sun { transform: translateY(0); opacity: 1; }
        [data-theme="light"] .moon { transform: translateY(25px); opacity: 0; }
        [data-theme="dark"] .sun { transform: translateY(-25px); opacity: 0; }
        [data-theme="dark"] .moon { transform: translateY(0); opacity: 1; }

        .dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: 50px; right: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 15px; box-shadow: var(--shadow);
            display: none; flex-direction: column; overflow: hidden; z-index: 100; min-width: 120px;
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 12px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; gap: 8px; justify-content: flex-start; }
        .dropdown-item:hover { background: var(--accent-gradient); color: white; }

        .title { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: left; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; text-align: left; line-height: 1.4; }

        .otp-input {
            background: var(--bg); border: 2px solid var(--border); border-radius: 20px;
            padding: 15px; margin-bottom: 10px;
        }
        .otp-input input {
            width: 100%; border: none; outline: none; background: transparent;
            color: var(--text-primary); font-size: 24px; font-weight: 800;
            text-align: center; letter-spacing: 8px;
        }

        .btn {
            width: 100%; padding: 20px; border-radius: 20px;
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            margin-top: 20px; transition: transform 0.2s, opacity 0.3s;
        }
        .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2); }
        .btn-primary.disabled { opacity: 0.5; pointer-events: none; }
        .btn-link { background: transparent; border: none; color: var(--text-secondary); font-size: 14px; margin-top: 10px; cursor: pointer; }

        footer { margin-top: 40px; color: var(--text-secondary); font-size: 12px; }
        .error-message { color: #ff4444; font-size: 13px; text-align: left; visibility: hidden; min-height: 20px; }
        .error-message.show { visibility: visible; }
    </style>
</head>
<body data-theme="light">
    <div class="card">
        <header>
            <div class="header-left">
                <button class="back-btn" onclick="history.back()">←</button>
                <svg width="45" height="45" viewBox="0 0 200 200">
                    <path class="awning-part" d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="#f4ce9b"/>
                    <path d="M 25 105 Q 65 140 25 195 L 25 105 Z" fill="#eea54a"/>
                    <path d="M 90 120 L 125 120 Q 125 160 160 130 Q 195 160 150 195 Q 80 200 90 120 Z" fill="#e45d27"/>
                </svg>
            </div>
            <div class="controls">
                <div class="dropdown">
                    <button class="icon-btn" id="langBtn">🇹🇯</button>
                    <div class="dropdown-menu" id="langMenu">
                        <div class="dropdown-item" onclick="setLang('tj')">🇹🇯 Тоҷикӣ</div>
                        <div class="dropdown-item" onclick="setLang('ru')">🇷🇺 Русский</div>
                        <div class="dropdown-item" onclick="setLang('en')">🇬🇧 English</div>
                    </div>
                </div>
                <button class="icon-btn" id="themeBtn">
                    <div class="theme-icon-box">
                        <span class="sun">☀️</span>
                        <span class="moon">🌙</span>
                    </div>
                </button>
            </div>
        </header>

        <h1 class="title" id="t-title">Тасдиқи код</h1>
        <p class="subtitle" id="t-sub"></p>

        <div class="otp-input">
            <input type="text" id="otp" placeholder="••••••" maxlength="6" inputmode="numeric">
        </div>
        <div class="error-message" id="error">Коди нодуруст</div>

        <button class="btn btn-primary disabled" id="verifyBtn">Тасдиқ</button>
        <button class="btn-link" id="resendBtn">Аз нав фиристодан</button>

        <footer id="t-foot">© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        const i18n = {
            tj: { 
                flag: "🇹🇯", 
                title: "Тасдиқи код", 
                subPhone: "Коди 6-рақамаро ворид кунед, ки ба рақами {value} фиристода шуд",
                subEmail: "Коди 6-рақамаро ворид кунед, ки ба почтаи {value} фиристода шуд",
                btn: "Тасдиқ", 
                foot: "© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.",
                err: "Коди нодуруст",
                loading: "Дар ҳоли тасдиқ...",
                resend: "Аз нав фиристодан"
            },
            ru: { 
                flag: "🇷🇺", 
                title: "Подтверждение", 
                subPhone: "Введите 6-значный код, отправленный на номер {value}",
                subEmail: "Введите 6-значный код, отправленный на email {value}",
                btn: "Подтвердить", 
                foot: "© 2026 Bozorcha. Все права защищены.",
                err: "Неверный код",
                loading: "Проверка...",
                resend: "Отправить снова"
            },
            en: { 
                flag: "🇬🇧", 
                title: "Verification", 
                subPhone: "Enter the 6-digit code sent to {value}",
                subEmail: "Enter the 6-digit code sent to {value}",
                btn: "Verify", 
                foot: "© 2026 Bozorcha. All rights reserved.",
                err: "Invalid code",
                loading: "Verifying...",
                resend: "Resend code"
            }
        };

        const otpInput = document.getElementById('otp');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendBtn = document.getElementById('resendBtn');

        // Муайян кардани усули воридшавӣ
        const authMethod = localStorage.getItem('authMethod') || 'phone';
        const userValue = authMethod === 'phone' 
            ? localStorage.getItem('userPhone') 
            : localStorage.getItem('userEmail');

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedLang = localStorage.getItem('lang') || 'tj';
            document.body.setAttribute('data-theme', savedTheme);
            setLang(savedLang);
        };

        document.getElementById('themeBtn').onclick = () => {
            const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };

        document.getElementById('langBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('langMenu').classList.toggle('show'); };
        window.onclick = () => document.getElementById('langMenu').classList.remove('show');

        function setLang(lang) {
            const d = i18n[lang];
            document.getElementById('langBtn').innerText = d.flag;
            document.getElementById('t-title').innerText = d.title;
            document.getElementById('t-foot').innerText = d.foot;
            document.getElementById('verifyBtn').innerText = d.btn;
            document.getElementById('error').innerText = d.err;
            document.getElementById('resendBtn').innerText = d.resend;

            // Нишон додани паёми мувофиқ
            const subElement = document.getElementById('t-sub');
            if (authMethod === 'phone') {
                subElement.innerText = d.subPhone.replace('{value}', userValue || '+992...');
            } else {
                subElement.innerText = d.subEmail.replace('{value}', userValue || 'email...');
            }

            localStorage.setItem('lang', lang);
        }

        otpInput.addEventListener('input', () => {
            otpInput.value = otpInput.value.replace(/\D/g, '');
            verifyBtn.classList.toggle('disabled', otpInput.value.length !== 6);
        });

        verifyBtn.onclick = async () => {
            if (verifyBtn.classList.contains('disabled')) return;

            const lang = localStorage.getItem('lang') || 'tj';
            const code = otpInput.value;

            verifyBtn.innerText = i18n[lang].loading;
            verifyBtn.classList.add('disabled');

            let error;
            if (authMethod === 'phone') {
                const { error: err } = await _supabase.auth.verifyOtp({
                    phone: userValue,
                    token: code,
                    type: 'sms'
                });
                error = err;
            } else {
                const { error: err } = await _supabase.auth.verifyOtp({
                    email: userValue,
                    token: code,
                    type: 'email'
                });
                error = err;
            }

            if (error) {
                alert("Хатогӣ: " + error.message);
                verifyBtn.innerText = i18n[lang].btn;
                verifyBtn.classList.remove('disabled');
            } else {
                window.location.href = 'profile-form.html';
            }
        };

        resendBtn.onclick = async () => {
            const lang = localStorage.getItem('lang') || 'tj';
            alert(i18n[lang].resend + '...');

            if (authMethod === 'phone') {
                await _supabase.auth.signInWithOtp({ phone: userValue });
            } else {
                await _supabase.auth.signInWithOtp({ email: userValue });
            }
        };
    </script>
</body>
</html>
